<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Research Paper Summarizer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --accent-dim: #388bfd;
      --success: #3fb950;
      --error: #f85149;
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: "DM Sans", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      min-height: 100vh;
      line-height: 1.6;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: 2rem;
    }

    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      text-align: center;
      background: var(--surface);
      transition: border-color 0.2s, background 0.2s;
    }

    .upload-zone:hover {
      border-color: var(--accent);
    }

    .upload-zone.dragover {
      border-color: var(--accent);
      background: rgba(88, 166, 255, 0.05);
    }

    .upload-zone input[type="file"] {
      display: none;
    }

    .upload-label {
      cursor: pointer;
      display: block;
    }

    .upload-icon {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      opacity: 0.7;
    }

    .upload-text {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .file-name {
      margin-top: 0.75rem;
      font-family: "JetBrains Mono", monospace;
      font-size: 0.85rem;
      color: var(--accent);
    }

    .actions {
      margin-top: 1.5rem;
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    button {
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 500;
      padding: 0.6rem 1.25rem;
      border-radius: var(--radius);
      border: none;
      cursor: pointer;
      transition: opacity 0.2s, background 0.2s;
    }

    .btn-primary {
      background: var(--accent);
      color: var(--bg);
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--accent-dim);
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .spinner {
      width: 1.25rem;
      height: 1.25rem;
      border: 2px solid transparent;
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .result {
      margin-top: 2rem;
      padding: 1.5rem;
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }

    .result h2 {
      font-size: 1.1rem;
      margin-bottom: 1rem;
      color: var(--accent);
    }

    .summary-text {
      white-space: pre-wrap;
      font-size: 1rem;
    }

    .meta {
      margin-top: 1rem;
      font-size: 0.8rem;
      color: var(--muted);
      font-family: "JetBrains Mono", monospace;
    }

    .error-box {
      margin-top: 1.5rem;
      padding: 1rem;
      background: rgba(248, 81, 73, 0.1);
      border: 1px solid rgba(248, 81, 73, 0.3);
      border-radius: var(--radius);
      color: var(--error);
    }

    .error-box h3 {
      margin: 0 0 0.5rem 0;
      font-size: 0.95rem;
    }

    .error-box p {
      margin: 0;
      font-size: 0.9rem;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="container">
    <h1>AI Research Paper Summarizer</h1>
    <p class="subtitle">Upload a PDF to generate an AI-powered summary. Runs entirely on your machine.</p>

    <div class="upload-zone" id="uploadZone">
      <label class="upload-label" for="fileInput">
        <div class="upload-icon">📄</div>
        <div>Click or drag a PDF file here</div>
        <div class="upload-text">Up to 40 pages, PDF only</div>
        <div class="file-name" id="fileName"></div>
      </label>
      <input type="file" id="fileInput" accept=".pdf,application/pdf" />
    </div>

    <div class="actions">
      <button class="btn-primary" id="submitBtn" disabled>Summarize</button>
      <div class="loading-row hidden" id="loadingRow">
        <div class="spinner"></div>
        <span>Processing…</span>
      </div>
    </div>

    <div class="error-box hidden" id="errorBox">
      <h3>Error</h3>
      <p id="errorText"></p>
    </div>

    <div class="result hidden" id="resultBox">
      <h2>Summary</h2>
      <div class="summary-text" id="summaryText"></div>
      <div class="meta" id="metaText"></div>
    </div>
  </div>

  <script>
    const uploadZone = document.getElementById('uploadZone');
    const fileInput = document.getElementById('fileInput');
    const fileName = document.getElementById('fileName');
    const submitBtn = document.getElementById('submitBtn');
    const loadingRow = document.getElementById('loadingRow');
    const errorBox = document.getElementById('errorBox');
    const errorText = document.getElementById('errorText');
    const resultBox = document.getElementById('resultBox');
    const summaryText = document.getElementById('summaryText');
    const metaText = document.getElementById('metaText');

    let selectedFile = null;

    function showError(msg) {
      errorText.textContent = msg;
      errorBox.classList.remove('hidden');
      resultBox.classList.add('hidden');
    }

    function hideError() {
      errorBox.classList.add('hidden');
    }

    function showResult(data) {
      summaryText.textContent = data.summary_text;
      metaText.textContent = `${data.original_word_count} words → ${data.summary_word_count} words (${data.processing_time}s)`;
      resultBox.classList.remove('hidden');
      errorBox.classList.add('hidden');
    }

    uploadZone.addEventListener('click', () => fileInput.click());

    uploadZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadZone.classList.add('dragover');
    });

    uploadZone.addEventListener('dragleave', () => {
      uploadZone.classList.remove('dragover');
    });

    uploadZone.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadZone.classList.remove('dragover');
      const files = e.dataTransfer?.files;
      if (files && files[0]) handleFile(files[0]);
    });

    fileInput.addEventListener('change', (e) => {
      const f = e.target.files?.[0];
      if (f) handleFile(f);
    });

    function handleFile(file) {
      if (file.type !== 'application/pdf') {
        showError('Please select a PDF file.');
        return;
      }
      selectedFile = file;
      fileName.textContent = file.name;
      submitBtn.disabled = false;
      hideError();
      resultBox.classList.add('hidden');
    }

    submitBtn.addEventListener('click', async () => {
      if (!selectedFile) return;

      submitBtn.disabled = true;
      loadingRow.classList.remove('hidden');
      hideError();
      resultBox.classList.add('hidden');

      const formData = new FormData();
      formData.append('file', selectedFile);

      try {
        const res = await fetch('/api/summarize', {
          method: 'POST',
          body: formData,
        });

        let data;
        try {
          data = await res.json();
        } catch {
          data = {};
        }
        if (!res.ok) {
          const msg = Array.isArray(data.detail) ? data.detail[0]?.msg : (data.detail || data.error || 'Request failed');
          throw new Error(typeof msg === 'string' ? msg : 'Request failed');
        }

        showResult(data);
      } catch (err) {
        showError(err.message || 'An error occurred.');
      } finally {
        submitBtn.disabled = false;
        loadingRow.classList.add('hidden');
      }
    });
  </script>
</body>
</html>
